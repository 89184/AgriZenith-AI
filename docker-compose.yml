version: '3.8'

services:
  api:
    build: .
    container_name: agriboot-api
    ports:
      - "8000:8000"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-farmer-advisory}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: serve the web frontend (static)
  web:
    image: nginx:alpine
    container_name: agriboot-web
    ports:
      - "8080:80"
    volumes:
      - ./frontend/web:/usr/share/nginx/html
    restart: unless-stopped